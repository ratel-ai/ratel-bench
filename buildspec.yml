# AWS CodeBuild pipeline for ratel-bench (RAT-374).
#
# One build == one Ratel version benchmarked end to end at the FIXED EXPERIMENTS.md
# design: retrieval eval (BFCL + SR-Agents) -> LLM eval (BFCL + SR-Agents) ->
# summarize -> report -> both report.json to S3. Deterministic stages stay
# byte-identical to a laptop run; only the LLM provider (Bedrock) differs.
#
# The exact cargo/pnpm invocations are kept VISIBLE here (not hidden behind a
# wrapper) — see EXPERIMENTS.md. version-set / version-reset bookend every run.
#
# ── Per-run env overrides (set via `start-build --environment-variables-override`)
# EVERY variable has a default (below) — a plain "Start build" benchmarks the
# latest release (0.4.0, bm25). Override only what differs for another version:
#   RATEL_VERSION_ARGS   version-set selector, e.g. "--crate 0.4.0" | "--tag v0.3.0-rc.1" | "--rev <sha>"
#   RATEL_EXPECT         resolved version string version-set must assert, e.g. "0.4.0"
#   RATEL_VERSION_LABEL  stamped on every row (ratel_ai_core_version); "auto"/empty → derived as
#                        <RATEL_EXPECT>-<sparse|dense|hybrid> (0.4.0 gen) or <RATEL_EXPECT> (pre-0.4.0)
#   RATEL_SDK_VERSION    @ratel-ai/sdk npm version for the BFCL live-retrieval LLM eval, e.g. "0.4.0"
#   RATEL_GENERATION     "pre-0.4.0" (Rust retriever) | "0.4.0" (SDK --retriever)
#   RETRIEVER            0.4.0 only: bm25 | semantic | hybrid
#   RATEL_MODELS         comma list; default below (Claude via Bedrock + gpt via OpenAI)
#   DOLLAR_GLOBAL        hard USD cap per run (cloud spend)
#   REBASELINE_CONTROLS  "true" to run control arms live with --force (one-time Bedrock re-baseline)
#   RUN_STAGE            which half of the pipeline to run:
#                          both      (default) retrieval eval → LLM eval → summarize → report
#                          retrieval FREE — retrieval eval only, synced to S3, no LLM calls, no report
#                                    (use for byte-parity checks / retriever-quality-only refreshes)
#                          llm       skip retrieval, reuse the rows already in S3 → LLM eval → report
#                                    (SR-Agents needs a prior `retrieval`/`both` run's candidates in S3)
#
# NOT variables (fixed experiment design, EXPERIMENTS.md — identical every run):
# pool sizes (BFCL 30,100 / SR-Agents 50,100; LLM eval 100), top-k (1,3,5; LLM
# eval 5), scenarios (600), seed (42), arms (control-baseline,control-oracle,
# ratel-full). Changing those would fork the benchmark — edit the buildspec
# commands deliberately if the design itself ever changes.
#
# ── Models — every entry in RATEL_MODELS is an ENDPOINT LINK
# (`<baseURL>#<model-name>`); adding a model = appending one link. NO code
# changes. Formats: JSON dict {"models": ["<link>", …]} (default below) or a
# plain comma list (model names like "claude-sonnet-4-6" also still work).
# Links per provider:
#   Bedrock:    https://bedrock-runtime.<region>.amazonaws.com/openai/v1#<inference-profile-id>
#   Anthropic:  https://api.anthropic.com/v1#<model-name>
#   OpenAI:     https://api.openai.com/v1#<model-name>
#   Self-hosted (e.g. qwen3-4b via ratel-inference-gateway):
#               https://<gateway>.execute-api.<region>.amazonaws.com/prod/v1#qwen3-4b
# Provider hosts route through their NATIVE APIs (Bedrock: IAM role, no key;
# Anthropic/OpenAI: their SSM keys) with the friendly model id on every row —
# identical behavior to name-addressed models. Self-hosted links use the
# generic OpenAI-compatible client with the bearer from the SSM SecureString
# ${SSM_PREFIX}/MODEL_API_KEY (set once: aws ssm put-parameter --overwrite),
# and are auto-warmed (POST /warm) before the run.
# Cost column: known models are priced automatically (Bedrock profile
# decoration stripped); genuinely-new models read $0 unless priced via
# RATEL_PRICING_JSON. Accuracy metrics are unaffected either way.
# NOTE: a new model has no cached control arms — its first run executes all
# three arms live (~3-4x its ratel-full cost, bounded by DOLLAR_GLOBAL).
#
# ── Project-level env (set on the CodeBuild project, non-secret)
#   RESULTS_BUCKET       s3 bucket mirroring results/  (e.g. ratel-bench-results-340303437758)
#   SSM_PREFIX           SecureString .env params root (e.g. /ratel/bench)
#   AWS_REGION           eu-central-1
#   RATEL_LLM_BACKEND    "bedrock" (routes claude-* through Bedrock; gpt-* stay OpenAI)

version: 0.2

env:
  variables:
    # Version under test — defaults benchmark the latest published release.
    RATEL_VERSION_ARGS: "--crate 0.4.0"
    RATEL_EXPECT: "0.4.0"
    RATEL_SDK_VERSION: "0.4.0"
    RATEL_VERSION_LABEL: "auto" # auto/empty → derived in install (see header)
    RATEL_GENERATION: "0.4.0"
    RETRIEVER: "bm25"
    RATEL_MODELS: '{"models":["https://bedrock-runtime.eu-central-1.amazonaws.com/openai/v1#eu.anthropic.claude-sonnet-4-6","https://bedrock-runtime.eu-central-1.amazonaws.com/openai/v1#eu.anthropic.claude-haiku-4-5-20251001-v1:0","https://api.openai.com/v1#gpt-5.4-mini"]}'
    DOLLAR_GLOBAL: "60"
    REBASELINE_CONTROLS: "false"
    RUN_STAGE: "both" # both | retrieval (free) | llm — see header
    RATEL_LLM_BACKEND: "bedrock"
    SSM_PREFIX: "/ratel/bench"
    # Zero-code new-model support (see "Adding a new model" in the header):
    BEDROCK_PROFILE_MAP: "{}" # advanced: extra claude-* → native Bedrock profile ids (JSON)
    RATEL_PRICING_JSON: "{}" # advanced: price genuinely-new models (JSON)

phases:
  install:
    commands:
      # Custom slim image already provides node/pnpm/rust/awscli + the baked
      # bge-small model; this phase wires up per-run secrets/state and installs deps.
      - set -euo pipefail
      # Derive the row label when not overridden: 0.4.0-gen appends the retriever
      # family (bm25→sparse, semantic→dense, hybrid→hybrid); pre-0.4.0 is bare.
      - |
        if [ -z "${RATEL_VERSION_LABEL}" ] || [ "${RATEL_VERSION_LABEL}" = "auto" ]; then
          if [ "${RATEL_GENERATION}" = "0.4.0" ]; then
            case "${RETRIEVER}" in
              bm25)     RATEL_VERSION_LABEL="${RATEL_EXPECT}-sparse" ;;
              semantic) RATEL_VERSION_LABEL="${RATEL_EXPECT}-dense" ;;
              *)        RATEL_VERSION_LABEL="${RATEL_EXPECT}-${RETRIEVER}" ;;
            esac
          else
            RATEL_VERSION_LABEL="${RATEL_EXPECT}"
          fi
        fi
        export RATEL_VERSION_LABEL
      - 'echo "Benchmarking ${RATEL_VERSION_LABEL} (${RATEL_VERSION_ARGS}) — generation ${RATEL_GENERATION}, retriever ${RETRIEVER}"'
      # Keep the cargo registry + git cache inside the source dir so CodeBuild caches it.
      - export CARGO_HOME="${CODEBUILD_SRC_DIR}/.cargo"
      - export PATH="/usr/local/cargo/bin:${CARGO_HOME}/bin:${PATH}"

      # 1. Materialize agent/.env from SSM SecureString (free tier; NO Secrets Manager).
      #    OPENAI_API_KEY is needed for gpt-*; Claude via Bedrock uses the IAM role.
      #    ANTHROPIC_API_KEY is optional — set it in SSM only if you want runs with
      #    RATEL_LLM_BACKEND=anthropic (claude-* via the Anthropic API instead of Bedrock).
      - |
        {
          echo "OPENAI_API_KEY=$(aws ssm get-parameter --name "${SSM_PREFIX}/OPENAI_API_KEY" --with-decryption --query Parameter.Value --output text)"
          AK="$(aws ssm get-parameter --name "${SSM_PREFIX}/ANTHROPIC_API_KEY" --with-decryption --query Parameter.Value --output text 2>/dev/null || true)"
          if [ -n "${AK}" ] && [ "${AK}" != "PLACEHOLDER-set-via-put-parameter" ]; then
            echo "ANTHROPIC_API_KEY=${AK}"
          fi
          # Bearer for endpoint-link models in RATEL_MODELS (<baseURL>#<model>).
          MK="$(aws ssm get-parameter --name "${SSM_PREFIX}/MODEL_API_KEY" --with-decryption --query Parameter.Value --output text 2>/dev/null || true)"
          if [ -n "${MK}" ] && [ "${MK}" != "PLACEHOLDER-set-via-put-parameter" ]; then
            echo "AWS_BEDROCK_BEARER=${MK}"
          fi
        } > agent/.env

      # 2. git SSH deploy key for the private ratel repo (version-set --tag/--rev).
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - aws ssm get-parameter --name "${SSM_PREFIX}/RATEL_DEPLOY_KEY" --with-decryption --query Parameter.Value --output text > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
      - export GIT_SSH_COMMAND="ssh -o BatchMode=yes"

      # 3. Pull prior raw cells + caches (canonical agent.jsonl control arms live here)
      #    and the normalized corpora (test-data/ is gitignored, so it lives in S3).
      - aws s3 sync "s3://${RESULTS_BUCKET}/raw" results/raw
      - aws s3 sync "s3://${RESULTS_BUCKET}/test-data" test-data

      # 4. Install JS deps (base). pre_build re-installs after the SDK bump.
      - pnpm install --frozen-lockfile

  pre_build:
    commands:
      - set -euo pipefail
      # Pin the Ratel version under test. version-reset first is idempotent safety
      # (clears any stale .version-set-baseline/ from an aborted prior build).
      - pnpm version-reset || true
      - pnpm version-set ${RATEL_VERSION_ARGS} --expect "${RATEL_EXPECT}"
      # BFCL LLM eval retrieves LIVE through @ratel-ai/sdk, so pin the matching SDK.
      - |
        if [ -n "${RATEL_SDK_VERSION:-}" ]; then
          sed -i "s#npm:@ratel-ai/sdk@[^\"]*#npm:@ratel-ai/sdk@${RATEL_SDK_VERSION}#" agent/package.json
          pnpm install --frozen-lockfile=false
        fi

  build:
    commands:
      # NOTE: each `- |` block is self-contained (own `set` + locally-derived vars).
      # CodeBuild runs each commands[] entry in a fresh shell, so shell state does
      # NOT persist between entries — anything shared (FORCE_FLAG, candidate paths)
      # is re-derived inside the block that uses it. RUN_STAGE gates the two halves.
      - 'echo "RUN_STAGE=${RUN_STAGE:-both} — retrieval=$([ "${RUN_STAGE:-both}" != llm ] && echo yes || echo no) llm=$([ "${RUN_STAGE:-both}" != retrieval ] && echo yes || echo no)"'

      # ─────────────────────────── BFCL ───────────────────────────
      - |
        set -euo pipefail
        FORCE_FLAG=""; [ "${REBASELINE_CONTROLS}" = "true" ] && FORCE_FLAG="--force"

        # Retrieval eval (pools 30,100 × k 1,3,5 × seed 42) — skipped in llm stage.
        if [ "${RUN_STAGE:-both}" != "llm" ]; then
          if [ "${RATEL_GENERATION}" = "0.4.0" ]; then
            RATEL_VERSION_LABEL="${RATEL_VERSION_LABEL}" pnpm -F @ratel-ai/benchmark bfcl-candidates \
              --retriever "${RETRIEVER}" --pool-sizes 30,100 \
              --output "results/raw/bfcl/retrieval-${RATEL_VERSION_LABEL}.jsonl"
          else
            cargo run -p ratel-benchmark-retrieval --release -- retrieval \
              --corpus test-data/bfcl-all.jsonl \
              --output results/raw/bfcl/retrieval-rows.jsonl \
              --scenarios 600 --top-k 1,3,5 --pool-sizes 30,100 --seed 42
          fi
        fi

        # LLM eval (pool 100, top 5, 3 arms; controls reused from cache — only ratel-full runs live).
        # Skipped in retrieval stage. BFCL retrieves LIVE via the SDK, so it needs no prior rows.
        if [ "${RUN_STAGE:-both}" != "retrieval" ]; then
          RATEL_VERSION_LABEL="${RATEL_VERSION_LABEL}" pnpm -F @ratel-ai/benchmark start \
            --corpus test-data/bfcl-all.jsonl \
            --output "results/raw/bfcl/agent-${RATEL_VERSION_LABEL}.jsonl" \
            --cache-source results/raw/bfcl/agent.jsonl \
            --arms control-baseline,control-oracle,ratel-full \
            --models "${RATEL_MODELS}" \
            $( [ "${RATEL_GENERATION}" = "0.4.0" ] && echo --retriever "${RETRIEVER}" ) \
            --pool-sizes 100 --top-k 5 --runs 1 --no-judge \
            --concurrency 4 --timeout-ms 180000 --dollar-global "${DOLLAR_GLOBAL}" ${FORCE_FLAG}
        fi

      # ─────────────────────────── SR-Agents ───────────────────────────
      - |
        set -euo pipefail
        FORCE_FLAG=""; [ "${REBASELINE_CONTROLS}" = "true" ] && FORCE_FLAG="--force"

        # Candidate reference (pool_ids for BOTH 50 & 100) — deterministic, seed 42.
        # Regenerate when the retrieval stage runs, or in llm stage only if the file
        # wasn't already pulled from S3 (deterministic + free, so safe to recreate).
        if [ "${RUN_STAGE:-both}" != "llm" ] || [ ! -f results/raw/sragents/candidates.jsonl ]; then
          cargo run -p ratel-benchmark-retrieval --release -- skill-retrieval \
            --instances test-data/sragents.jsonl --skills-catalog test-data/sragents-skills.jsonl \
            --output results/raw/sragents/candidates.jsonl \
            --scenarios 600 --top-k 5 --pool-sizes 50,100 --seed 42
        fi

        # Per-version candidate ranking (retrieval eval). Path is deterministic from
        # the label/generation, so both the retrieval and llm stages can name it.
        if [ "${RATEL_GENERATION}" = "0.4.0" ]; then
          SR_CANDIDATES="results/raw/sragents/candidates-${RATEL_VERSION_LABEL}.jsonl"
          if [ "${RUN_STAGE:-both}" != "llm" ]; then
            RATEL_VERSION_LABEL="${RATEL_VERSION_LABEL}" pnpm -F @ratel-ai/benchmark sragents-candidates \
              --retriever "${RETRIEVER}" --pool-sizes 50,100 --top-k 5 \
              --pool-from results/raw/sragents/candidates.jsonl \
              --output "${SR_CANDIDATES}"
          fi
        else
          SR_CANDIDATES="results/raw/sragents/candidates.jsonl"
        fi

        # LLM eval (pool 100, top 5, 3 arms). Controls retriever-independent → reused.
        # Skipped in retrieval stage; in llm stage the candidates must already exist
        # (from a prior retrieval/both run, pulled from S3 at install).
        if [ "${RUN_STAGE:-both}" != "retrieval" ]; then
          if [ ! -f "${SR_CANDIDATES}" ]; then
            echo "ERROR: ${SR_CANDIDATES} not found — run RUN_STAGE=retrieval (or both) for this version first so its candidates are in S3." >&2
            exit 1
          fi
          RATEL_VERSION_LABEL="${RATEL_VERSION_LABEL}" pnpm -F @ratel-ai/benchmark sragents-select \
            --candidates "${SR_CANDIDATES}" \
            --catalog test-data/sragents-skills.jsonl \
            --cache-source results/raw/sragents/agent.jsonl \
            --output "results/raw/sragents/agent-${RATEL_VERSION_LABEL}.jsonl" \
            --arms control-baseline,control-oracle,ratel-full \
            --models "${RATEL_MODELS}" \
            --pool-size 100 --top-k 5 --scenarios 600 \
            --concurrency 8 --dollar-global "${DOLLAR_GLOBAL}" ${FORCE_FLAG}
        fi

  post_build:
    commands:
      # Summarize (pure transforms) + report -> report.json ×2 — only when the LLM
      # eval ran. A retrieval-only run just syncs its rows to S3 for parity / reuse.
      - |
        set -euo pipefail
        if [ "${RUN_STAGE:-both}" = "retrieval" ]; then
          echo "RUN_STAGE=retrieval — skipping summarize/report; retrieval rows are synced to S3 for parity/reuse."
        else
          if [ "${RATEL_GENERATION}" = "0.4.0" ]; then
            pnpm -F @ratel-ai/benchmark bfcl-summarize \
              --retrieval-rows "results/raw/bfcl/retrieval-${RATEL_VERSION_LABEL}.jsonl" \
              --agent "results/raw/bfcl/agent-${RATEL_VERSION_LABEL}.jsonl" --corpus test-data/bfcl-all.jsonl
            SR_RETRIEVAL_ROWS="results/raw/sragents/candidates-${RATEL_VERSION_LABEL}.jsonl"
          else
            pnpm -F @ratel-ai/benchmark bfcl-summarize \
              --retrieval-rows results/raw/bfcl/retrieval-rows.jsonl \
              --agent "results/raw/bfcl/agent-${RATEL_VERSION_LABEL}.jsonl" --corpus test-data/bfcl-all.jsonl
            SR_RETRIEVAL_ROWS="results/raw/sragents/candidates.jsonl"
          fi
          pnpm -F @ratel-ai/benchmark bfcl-report
          pnpm -F @ratel-ai/benchmark sragents-summarize --retrieval-rows "${SR_RETRIEVAL_ROWS}" --agent "results/raw/sragents/agent-${RATEL_VERSION_LABEL}.jsonl"
          pnpm -F @ratel-ai/benchmark sragents-report
        fi

        # Restore the committed baseline so the tree/image is clean for the next run.
        pnpm version-reset || true

        # Push refreshed raw cells/caches + both reports back to S3 (the persistent state).
        aws s3 sync results/ "s3://${RESULTS_BUCKET}/"

artifacts:
  files:
    - results/reports/bfcl/report.json
    - results/reports/sragents/report.json
  name: ratel-bench-reports

# Local build cache — cargo registry/target + pnpm store — so repeat runs skip
# recompiling the world. Best-effort (per-host); the authoritative result state
# lives in S3 (synced in install/post_build).
cache:
  paths:
    - ".cargo/**/*"
    - "target/**/*"
    - "node_modules/**/*"
    - "agent/node_modules/**/*"
